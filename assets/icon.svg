<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="50%" stop-color="#14143a" />
      <stop offset="100%" stop-color="#060612" />
    </linearGradient>

    <!-- X Gradient -->
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#e040fb" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" />

  <!-- Floating Mathematical Symbols -->
  <g fill="#f59e0b" opacity="0.6" font-family="sans-serif" font-weight="bold">
    <text x="80" y="120" font-size="50">+</text>
    <text x="400" y="180" font-size="70">−</text>
    <text x="120" y="420" font-size="60">×</text>
    <text x="380" y="380" font-size="55">÷</text>
  </g>

  <!-- Central X -->
  <g filter="url(#glow)">
    <path d="M146 126 L366 386 L296 386 L146 206 Z" fill="url(#cyanPurple)" />
    <path d="M366 126 L146 386 L216 386 L366 206 Z" fill="url(#cyanPurple)" opacity="0.9" />
  </g>
</svg>
